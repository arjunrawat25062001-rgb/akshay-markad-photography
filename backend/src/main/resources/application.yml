spring:
  application:
    name: akshay-markad-photography-api

  datasource:
    url: jdbc:postgresql://localhost:5432/photography
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

flyway:
  enabled: true
  locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
